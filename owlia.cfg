  HEADER:   start = $0,    size = $10,   fill = yes, fillval = $00;

  #ram
  ZP:         start = $0,    size = $100, fill = no;
  STACK:      start = $0100, size = $100, fill = no;
  SPRITE_RAM: start = $0200, size = $100, fill = no;
  MAP_RAM:    start = $0300, size = $100, fill = no;
  PATCH_RAM:  start = $0300, size = $100, fill = no;
  RAM:        start = $0400, size = $400, fill = no;

  #prg-rom
  ROM00:     start = $8000, size = $4000, fill = yes, fillval = $ff;

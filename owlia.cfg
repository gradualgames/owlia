#Config file for Owlia

MEMORY
{
  #iNES header
  HEADER:   start = $0,    size = $10,   fill = yes, fillval = $00;

  #ram
  ZP:       start = $0,    size = $100,  fill = no;
  STACK:    start = $0100, size = $100,  fill = no;
  RAM:      start = $0200, size = $600,  fill = no;

  #prg-rom
  ROM00:    start = $8000, size = $4000, fill = yes, fillval = $ff;
  ROM01:    start = $8000, size = $4000, fill = yes, fillval = $ff;
  ROM02:    start = $8000, size = $4000, fill = yes, fillval = $ff;
  ROM03:    start = $8000, size = $4000, fill = yes, fillval = $ff;
  ROM04:    start = $8000, size = $4000, fill = yes, fillval = $ff;
  ROM05:    start = $8000, size = $4000, fill = yes, fillval = $ff;
  ROM06:    start = $8000, size = $4000, fill = yes, fillval = $ff;
  ROM07:    start = $8000, size = $4000, fill = yes, fillval = $ff;
  ROM08:    start = $8000, size = $4000, fill = yes, fillval = $ff;
  ROM09:    start = $8000, size = $4000, fill = yes, fillval = $ff;
  ROM10:    start = $8000, size = $4000, fill = yes, fillval = $ff;
  ROM11:    start = $8000, size = $4000, fill = yes, fillval = $ff;
  ROM12:    start = $8000, size = $4000, fill = yes, fillval = $ff;
  ROM13:    start = $8000, size = $4000, fill = yes, fillval = $ff;
  ROM14:    start = $8000, size = $4000, fill = yes, fillval = $ff;

  #fixed prg-rom
  ROM15: start = $c000, size = $3ffa, fill = yes, fillval = $ff;

  #vectors
  ROMV:     start = $fffa, size = $6,    fill = no;

  #debug output for NintendulatorDX
  NDXDEBUG: start = 0, size  = $10000000, type  = ro, file = "owlia.nes.ndx";
}

SEGMENTS
{
  #header
  HEADER:    load = HEADER,   type = ro,  optional = yes;

  #ram
  ZEROPAGE:  load = ZP,       type = zp,  optional = yes;
  STACK:     load = STACK,    type = bss, optional = yes;
  BSS:       load = RAM,      type = bss, optional = yes;

  #prg-rom
  ROM00:     load = ROM00,     type = ro,  optional = yes;
  ROM01:     load = ROM01,     type = ro,  optional = yes;
  ROM02:     load = ROM02,     type = ro,  optional = yes;
  ROM03:     load = ROM03,     type = ro,  optional = yes;
  ROM04:     load = ROM04,     type = ro,  optional = yes;
  ROM05:     load = ROM05,     type = ro,  optional = yes;
  ROM06:     load = ROM06,     type = ro,  optional = yes;
  ROM07:     load = ROM07,     type = ro,  optional = yes;
  ROM08:     load = ROM08,     type = ro,  optional = yes;
  ROM09:     load = ROM09,     type = ro,  optional = yes;
  ROM10:     load = ROM10,     type = ro,  optional = yes;
  ROM11:     load = ROM11,     type = ro,  optional = yes;
  ROM12:     load = ROM12,     type = ro,  optional = yes;
  ROM13:     load = ROM13,     type = ro,  optional = yes;
  ROM14:     load = ROM14,     type = ro,  optional = yes;

  #fixed prg-rom
  CODE:      load = ROM15, type = ro,  optional = yes;

  #vectors
  VECTORS:   load = ROMV,  type = ro,  optional = yes;

  #debug output for NintendulatorDX
  NDXDEBUG:  load = NDXDEBUG, type = ro,  optional  = yes;
}
